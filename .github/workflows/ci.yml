name: Agent Orchestrator CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest pytest-asyncio
      - name: Run backend tests
        run: |
          cd backend
          pytest tests -v --tb=short || echo "No tests"

  backend-lint:
    needs: [backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linting tools
        run: |
          python -m pip install black ruff isort
      - name: Lint backend
        run: |
          black backend || true
          ruff check backend/ || true
          isort --check-only backend/ || true

  frontend-tests:
    needs: [backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install frontend deps
        run: |
          if [ -d frontend ]; then (cd frontend && npm ci); fi
      - name: Run frontend tests
        run: |
          if [ -d frontend/tests ]; then (cd frontend && npm test --silent || true); else echo "No frontend tests"; fi
