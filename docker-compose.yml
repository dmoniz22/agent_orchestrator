version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omni-postgres
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni_password
      POSTGRES_DB: omni
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: omni-backend
    environment:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: omni
      DB_USER: omni
      DB_PASSWORD: omni_password
      OLLAMA_BASE_URL: http://localhost:11434
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      ENV_FILE_PATH: /app/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/CONFIG:/app/CONFIG
      - ./backend/.env:/app/.env
    restart: unless-stopped
    network_mode: host

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: omni-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev
    network_mode: host
    depends_on:
      - backend

volumes:
  postgres_data: