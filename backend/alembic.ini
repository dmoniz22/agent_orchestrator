# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names - Change the max length of the default file name to
# 63 if you notice the default file name is getting truncated
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `alembic[tz]` to the pip requirements
# string value is passed to dateutil.tz.gettz()
# timezone =

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator used here should be the separator specified by "version_path_separator" below.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within the alembic.ini file is OS-specific, and is not the
# same as in the previous Alembic version 1.10 and before.
# If in doubt, set this to the same value you used in Alembic 1.10 for the version_locations key.
# Valid values are:
#
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space
version_path_separator = os  # Use OS path separator for cross-platform compatibility

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://omni:omni_password@localhost:5432/omni


[post_write_hooks]
# post_write_hooks defines scripts or Python callables to be run on newly
# generated revision scripts.  These can also be used to run arbitrary
# code after each revision, e.g. to apply patches to tables.
#
# Prepending any callables in this section with `revision_` will call
# those callables with the revision (single or multi) string as a positional argument.
# post_write_hooks = hook1,hook2

# Hook implementations can be in separate modules in the alembic env directory,
# or in the alembic/hooks directory. The module (and function) name should follow
# the same naming convention.
# hook1 = alembic.migrations.hooks.post_process_revision
# hook2 = module.path:function_name

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
