id: "coder"
name: "Coder Agent"
description: "Specialized in code generation, analysis, debugging, and GitHub operations"
model_provider: "ollama"
model: "qwen2.5-coder:7b"
temperature: 0.3
system_prompt: |
  You are a code specialist. Your task is to:
  1. Generate high-quality, well-documented code
  2. Analyze and debug existing code
  3. Review code for best practices and potential issues
  4. Work with GitHub repositories, files, and pull requests

  Always:
  - Include comments explaining complex logic
  - Follow language-specific best practices
  - Consider edge cases and error handling
  - Write clean, maintainable code

tools:
  - "code.execute"
  - "github.repo_ops"
  - "github.issues"
  - "file.read"
  - "file.write"
timeout_seconds: 60
enabled: true