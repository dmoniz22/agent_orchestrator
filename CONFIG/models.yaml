# OMNI Model Configuration
# Supports Ollama (local) and OpenRouter (cloud) with automatic fallback

providers:
  # Primary: Ollama (local, free, private)
  - id: "ollama"
    type: "ollama"
    base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"
    default_model: "llama3.1:8b"
    fallback_model: "qwen2.5:7b"
    enabled: true
    models:
      - name: "llama3.1:8b"
        description: "Meta Llama 3.1 8B - General purpose model"
        supports_tools: true
        context_window: 8192
        capabilities:
          - chat
          - tools
      
      - name: "llama3.1:70b"
        description: "Meta Llama 3.1 70B - High quality general purpose"
        supports_tools: true
        context_window: 128000
        capabilities:
          - chat
          - tools
      
      - name: "qwen2.5:7b"
        description: "Qwen 2.5 7B - Fast general purpose"
        supports_tools: true
        context_window: 32768
        capabilities:
          - chat
          - tools
      
      - name: "qwen2.5-coder:7b"
        description: "Qwen 2.5 Coder 7B - Specialized for code"
        supports_tools: true
        context_window: 32768
        capabilities:
          - chat
          - tools
          - completion
      
      - name: "nomic-embed-text"
        description: "Nomic Embed Text - For embeddings"
        supports_tools: false
        context_window: 2048
        capabilities:
          - embeddings
    
    retry:
      max_retries: 3
      base_delay_seconds: 2
      timeout_seconds: 60

  # Fallback: OpenRouter (cloud, provides access to 100+ models)
  - id: "openrouter"
    type: "openrouter"
    enabled: true
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    site_url: "${SITE_URL:http://localhost:3000}"
    site_name: "OMNI Multi-Agent System"
    default_model: "anthropic/claude-3-haiku-20240307"
    fallback_model: "openai/gpt-3.5-turbo-0125"
    
    # Popular model aliases for convenience
    model_aliases:
      # Anthropic
      "claude-opus": "anthropic/claude-3-opus-20240229"
      "claude-sonnet": "anthropic/claude-3.5-sonnet-20241022"
      "claude-haiku": "anthropic/claude-3-haiku-20240307"
      # OpenAI
      "gpt-4o": "openai/gpt-4o-2024-08-01"
      "gpt-4o-mini": "openai/gpt-4o-mini-2024-07-18"
      "gpt-4-turbo": "openai/gpt-4-turbo-2024-04-09"
      "gpt-3.5": "openai/gpt-3.5-turbo-0125"
      # Google
      "gemini-pro": "google/gemini-pro-1.5"
      "gemini-flash": "google/gemini-flash-1.5-8b"
      # Meta
      "llama-3.1-70b": "meta-llama/llama-3.1-70b-instruct"
      "llama-3.1-8b": "meta-llama/llama-3.1-8b-instruct"
      # Mistral
      "mistral-large": "mistralai/mistral-large"
      "mistral-medium": "mistralai/mistral-medium-2312"
      # DeepSeek
      "deepseek-chat": "deepseek/deepseek-chat"
      "deepseek-coder": "deepseek/deepseek-coder"
    
    retry:
      max_retries: 3
      base_delay_seconds: 2
      timeout_seconds: 120

# Fallback Provider Settings
fallback:
  enabled: true
  prefer_local: true    # Try Ollama first for local models
  fallback_on_error: true  # Automatically fallback if Ollama fails
  
# Default model assignments by task type
default_assignments:
  # Fast, simple tasks
  quick: "ollama:qwen2.5:7b"
  
  # Standard conversation
  chat: "ollama:llama3.1:8b"
  
  # Complex reasoning (fallback to cloud if needed)
  reasoning: "openrouter:claude-sonnet"
  
  # Code generation
  coding: "ollama:qwen2.5-coder:7b"
  
  # High quality output
  quality: "openrouter:claude-opus"
